name: Sync results

on:
  # GitHub cron schedules are UTC. Generated from the openfootball WC2026 feed.
  # Each match gets two sync windows: kickoff +55m (half-time check) and a
  # post-match check (+125m for group matches, +170m for knockouts so extra time
  # and penalties can finish). Max from the current schedule is 12 calls/day.
  # GitHub scheduled runs can still drift or be dropped under load.
  schedule:
    # June 2026
    - cron: "55 19 11,12,13,15,16,18,19,21,24,26,28 6 *"
    - cron: "5 21 11,12,13,15,16,18,19,21,24,26 6 *"
    - cron: "55 2 12,15,18,24,26,28 6 *"
    - cron: "5 4 12,15,18,24,26,28 6 *"
    - cron: "55 1 13,14,16,17,19,22,25,30 6 *"
    - cron: "5 3 13,14,16,17,19,22,25 6 *"
    - cron: "55 22 13,15,16,18,19,21,24 6 *"
    - cron: "5 0 14,16,17,19,20,22,25 6 *"
    - cron: "55 4 14,17,21 6 *"
    - cron: "5 6 14,17,21 6 *"
    - cron: "55 17 14,17,20,22,23,29,30 6 *"
    - cron: "5 19 14,17,20,22,23 6 *"
    - cron: "55 20 14,17,20,23,25 6 *"
    - cron: "5 22 14,17,20,23,25 6 *"
    - cron: "55 23 14,17,23,25 6 *"
    - cron: "5 1 15,18,24,26 6 *"
    - cron: "55 16 15,18,21 6 *"
    - cron: "5 18 15,18,21 6 *"
    - cron: "25 1 20 6 *"
    - cron: "35 2 20 6 *"
    - cron: "55 3 20,23,27 6 *"
    - cron: "5 5 20,23,27 6 *"
    - cron: "55 0 21,23,27 6 *"
    - cron: "5 2 21,23,27 6 *"
    - cron: "55 21 22,27,30 6 *"
    - cron: "5 23 22,27 6 *"
    - cron: "25 0 28 6 *"
    - cron: "35 1 28 6 *"
    - cron: "50 21 28 6 *"
    - cron: "50 19 29,30 6 *"
    - cron: "25 21 29 6 *"
    - cron: "20 23 29 6 *"
    - cron: "50 3 30 6 *"
    - cron: "50 23 30 6 *"
    # July 2026
    - cron: "55 1 1,12 7 *"
    - cron: "50 3 1,12 7 *"
    - cron: "55 16 1,7 7 *"
    - cron: "50 18 1,7 7 *"
    - cron: "55 20 1,5,7,9 7 *"
    - cron: "50 22 1,5,7,9 7 *"
    - cron: "55 0 2,6,7 7 *"
    - cron: "50 2 2,6,7 7 *"
    - cron: "55 19 2,6,10,14,15,19 7 *"
    - cron: "50 21 2,6,10,14,15,19 7 *"
    - cron: "55 23 2 7 *"
    - cron: "50 1 3 7 *"
    - cron: "55 3 3 7 *"
    - cron: "50 5 3 7 *"
    - cron: "55 18 3 7 *"
    - cron: "50 20 3 7 *"
    - cron: "55 22 3 7 *"
    - cron: "50 0 4 7 *"
    - cron: "25 2 4 7 *"
    - cron: "20 4 4 7 *"
    - cron: "55 17 4 7 *"
    - cron: "50 19 4 7 *"
    - cron: "55 21 4,11,18 7 *"
    - cron: "50 23 4,11,18 7 *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    name: POST /api/sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SYNC_URL: ${{ secrets.SYNC_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Check tournament year
        id: tournament-year
        shell: bash
        run: |
          if [ "$(date -u +%Y)" = "2026" ]; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "WC2026 match-aware schedule is inactive outside 2026."
          fi

      - name: Validate configuration
        if: github.event_name == 'workflow_dispatch' || steps.tournament-year.outputs.active == 'true'
        shell: bash
        run: |
          test -n "$SYNC_URL"
          test -n "$CRON_SECRET"

      - name: Sync latest results
        if: github.event_name == 'workflow_dispatch' || steps.tournament-year.outputs.active == 'true'
        shell: bash
        run: |
          curl -fsS -X POST "$SYNC_URL" \
            -H "Authorization: Bearer $CRON_SECRET"
